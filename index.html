<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>제나벨 × SkinSeoul — Shopify D2C 제안</title>
<meta name="robots" content="noindex">
<meta property="og:title" content="제나벨 × SkinSeoul — Shopify D2C 성장·운영 대행 제안">
<meta property="og:description" content="제나벨의 미국 Shopify 자사몰 성장·운영 대행 제안서">
<style>
  html,body{margin:0;height:100%;background:#04000C;color:#E1D3FF;
    font-family:"Apple SD Gothic Neo",system-ui,-apple-system,sans-serif;}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  .dot{width:30px;height:30px;border:3px solid rgba(225,211,255,.25);border-top-color:#8b5cf6;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#C4B5FD}
  .fallback{font-size:13px;opacity:.7}
</style>
<script>
(function(){
  try{
    var p = new URLSearchParams(location.search);
    var force = p.get('v'); // 'd' | 'm'
    var saved = null; try{ saved = localStorage.getItem('gb_view'); }catch(e){}
    var choice = (force === 'd' || force === 'm') ? force : saved;
    if(choice !== 'd' && choice !== 'm'){
      var narrow  = window.matchMedia('(max-width: 820px)').matches;
      var touchSm = window.matchMedia('(pointer: coarse)').matches && window.matchMedia('(max-width: 1100px)').matches;
      var portraitPhone = window.matchMedia('(orientation: portrait)').matches && window.matchMedia('(max-width: 900px)').matches;
      choice = (narrow || touchSm || portraitPhone) ? 'm' : 'd';
    }
    if(force){ try{ localStorage.setItem('gb_view', force); }catch(e){} }
    location.replace(choice === 'm' ? 'm/' : 'd/');
  }catch(e){ location.replace('d/'); }
})();
</script>
</head>
<body>
  <div class="wrap">
    <div class="dot"></div>
    <noscript class="fallback">
      제안서를 보려면 버전을 선택하세요 ·
      <a href="d/">데스크톱 버전</a> &nbsp;|&nbsp; <a href="m/">모바일 버전</a>
    </noscript>
  </div>
</body>
</html>
